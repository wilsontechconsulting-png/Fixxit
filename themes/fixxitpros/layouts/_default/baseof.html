<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "en-us" }}">
<head>
  {{ partial "head.html" . }}
</head>
<body>

  {{ partial "header.html" . }}

  <main id="main-content" tabindex="-1">
    {{ block "main" . }}{{ end }}
  </main>

  {{ partial "footer.html" . }}

  {{ partial "cookie-banner.html" . }}

  <!-- Floating Phone Button -->
  <a
    href="tel:{{ .Site.Params.phone }}"
    class="floating-phone"
    aria-label="Call Fixxit Pros at {{ .Site.Params.phone }}"
  >
    <span class="floating-phone-icon" aria-hidden="true">📞</span>
    <span class="floating-phone-text">{{ .Site.Params.phone }}</span>
  </a>

  <!-- Main JavaScript -->
  <script src="{{ `/js/main.js` | relURL }}" defer></script>
  <script src="{{ `/js/spam-filter.js` | relURL }}"></script>

</body>
</html>
