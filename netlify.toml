[build]
  publish = "public"
  command = "hugo --minify"

[context.production.environment]
  HUGO_VERSION = "0.159.1"
  HUGO_ENV = "production"
  HUGO_ENABLEGITINFO = "true"

# Form spam filtering
[[plugins]]
  package = "@netlify/plugin-sitemap"

# Enable aggressive spam filtering on all forms
[functions]
  # No functions but this enables form processing

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
